<!DOCTYPE html>
<html itemtype="https://schema.org/VideoGame" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="x-content-type-options=nosniff" />

    <title>Facets!</title>
    <meta name="apple-mobile-web-app-title" content="Facets!" />
    <meta name="mobile-web-app-capable" content="no" />
    <meta name="apple-touch-fullscreen" content="no" />
    <meta name="apple-mobile-web-app-capable" content="no" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, minimum-scale=1, maximum-scale=5, user-scalable=yes" />
    <meta name="theme-color" id="themeColor" content="rgb(0, 9, 15)" />

    <meta name="keywords" content="Facets, Facets!, Big Tent Games, Games, Causual game, Puzzle game, Word game, Boardgame, Wil Voss" />
    <meta name="description" content="A game of connecting words that maybe don't connect so easily 💎." />

    <link rel="apple-touch-icon" sizes="120x120" href="../images/icon180.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../images/icon180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="../images/icon192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="../images/icon512-apple-touch.png" />

    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="../favicon.png" />

    <link rel="stylesheet" href="../styles/normalize.css" media="screen" />
    <link rel="stylesheet" href="../styles/main.min.css" media="screen" />
    <style>
      message {
        background: none;
        justify-content: center;
        flex-direction: column;
        text-align: center;
        align-items: center;
        display: flex;
        cursor: default;
        pointer-events: none;
        width: 80%;
      }
      modal controls.hide,
      message.hide,
      message.hide {
        display: none;
      }
      icon {
        position: relative;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <modal class="centered">
      <section>
        <h2>
          Facets!
          <small style="max-width: 100%; font-size: 50%; padding-top: var(--defaultGap)">
            A game of connecting words that maybe <br />
            don't connect so easily. 💎
          </small>
        </h2>
        <message id="message" class="hide">There was a problem. Quitting and restarting your browser might fix the issue.</message>
        <message class="inline loading" id="loadingButton">Loading<icon class="spinner show" style="position: relative"></icon></message>
        <controls id="controls" class="hide">
          <button onclick="location.href = location.origin" id="loadingButton">Okay</button>
        </controls>
      </section>
    </modal>

    <script src="../scripts/fetch-game.js" type="text/javascript"></script>
  </body>
</html>
