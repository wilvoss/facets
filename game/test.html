<!DOCTYPE html>
<html itemtype="https://schema.org/VideoGame" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="x-content-type-options=nosniff" />

    <title>test</title>
  </head>

  <body>
    <button onclick="GetGame()">Get game</button>

    <script type="text/javascript">
      async function GetGame() {
        if (location.search) {
          this.appStateIsGettingTinyURL = true;
          var corsflareUrl = 'https://worker-winter-glade-cd02.bigtentgames.workers.dev/';
          var requestUrl = corsflareUrl + location.search.substring(1);

          await fetch(requestUrl, {
            method: 'POST',
            headers: {
              Host: window.location.hostname,
              Origin: window.location.origin,
            },
          })
            .then((response) => {
              if (!response.ok) {
                throw new Error('Server error: ' + response.status);
              }
              return response.text();
            })
            .then((shortUrlParam) => console.log('https://facets.bigtentgames.com/game/?' + shortUrlParam))
            .catch((error) => console.error('Error:', error));
        }
      }
    </script>
  </body>
</html>
