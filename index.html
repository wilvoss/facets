<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Facets</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="keywords" content="casual, video, game, boardgame" />
    <meta name="description" content="" />
    <link rel="icon" type="image/png" sizes="48x48" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="stylesheet" href="styles/normalize.css" media="screen" />
    <link rel="stylesheet" href="styles/main.css" media="screen" />
  </head>

  <body>
    <app id="app" v-cloak :class="{guessing: isGuessing, reviewing: player.role === 'reviewer'}" @pointerup="HandleBodyPointerUp(event, isDragging ? draggedCard : getSelectedCard)">
      <input maxlength="0" :disabled="isGuessing" id="parkingInput" style="opacity: 0; width: 0px; height: 0px; overflow: hidden; position: absolute; z-index: -1" tabindex="-1" />
      <modal :class="{disabled: !showModal}" @click="showModal = false">
        <!-- <modal class="disabled"> -->
        <message>Choose a card</message>
        <cards>
          <card @click="HandleCardDrop(event, card)" v-for="card in getAllCards" v-if="card !== draggedCard" :class="{disabled: card.isInTray}">
            <words>
              <word v-for="word in card.words">{{word.value}}</word>
            </words>
          </card>
        </cards>
      </modal>
      <wrapper>
        <controls>
          <button @click="NewGame">New</button>
        </controls>
        <header>
          <hgroup>
            <h1>{{gameName}}</h1>
            <subtitle>{{gameCatchphrase}}</subtitle>
          </hgroup>
        </header>
        <controls><button @click="HandleSubmitButtonPress" :class="{disabled: !isGuessing && getNumberOfHintsThatHaveBeenFilled !== 4}">{{shareText}}</button></controls>
      </wrapper>
      <wrapper style="padding: 0">
        <message v-if="message !== ''">{{ message}}</message>
        <message v-if="message === '' && player.role === 'creator'">{{ player.name + ', you are creating a new puzzle!'}}</message>
        <message v-if="message === '' && player.role === 'reviewer'">{{ player.name + ', you are reviewing this guess!'}}</message>
        <message v-if="message === '' && player.role === 'guesser'">{{ player.name + ', you are now guessing!' }}</message>
      </wrapper>
      <wrapper>
        <rotators>
          <button class="clockwise" @click="RotateTray(1)"></button>
          <button class="anticlockwise" @click="RotateTray(-1)"></button>
        </rotators>
      </wrapper>
      <wrapper>
        <card class="ghost" :style="{transform: 'translate(' + ghostX + 'px, ' + ghostY + 'px)'}" :class="{show: isDragging}">
          <words>
            <word v-for="word in draggedCard.words">{{word.value}}</word>
          </words>
        </card>
      </wrapper>
      <wrapper>
        <parking>
          <spot v-for="(card, index) in parkedCards" v-if="index < 3" :class="{empty: card.words.length === 0, selected: card.isSelected}">
            <rotators>
              <button class="clockwise" @pointerdown="RotateCard(event, card, 1)"></button>
              <button class="anticlockwise" @pointerdown="RotateCard(event, card, -1)"></button>
            </rotators>
            <card @click="HandleCardClick(event, card)" @pointerup="HandleCardDrop(event, card)" @pointerdown="HandleCardPointerDown(event, card)" :style="{rotate: (card.rotation * 90) + 'deg'}" :class="{rotating: card.isRotating, selected: card.isSelected, dropped: card.justDropped, disabled: isDragging && card === getSelectedCard}">
              <words>
                <word v-for="word in card.words">{{word.value}}</word>
              </words>
            </card>
            <rotators>
              <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
              <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
            </rotators>
          </spot>
        </parking>
        <tray :class="{rotating: trayIsRotating}" :style="{rotate: trayRotation * 90 + 'deg'}">
          <hints>
            <hint v-for="(hint, index) in hints" :key="index">
              <input :id="'hint' + index" :disabled="isGuessing" v-model="hint.value" maxlength="14" :tabindex="index + 1" type="text" @focus="RotateTrayBasedOnInputFocus(index)" onfocus="this.placeholder=''" onblur="this.placeholder='_ _ _ _ _ _'" placeholder="_ _ _ _ _ _" />
            </hint>
          </hints>
          <cards>
            <spot v-for="(card, index) in cards" v-if="!card.isExtra" :class="{empty: card.words.length === 0, selected: card.isSelected}">
              <rotators>
                <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
                <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
              </rotators>
              <card @click="HandleCardClick(event, card)" @pointerup="HandleCardDrop(event, card)" @pointerdown="HandleCardPointerDown(event, card)" :style="{rotate: (card.rotation * 90) + 'deg'}" :class="{rotating: card.isRotating, selected: card.isSelected, dropped: card.justDropped, disabled: isDragging && card === getSelectedCard}">
                <words>
                  <word v-for="word in card.words">{{word.value}}</word>
                </words>
              </card>
              <rotators>
                <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
                <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
              </rotators>
            </spot>
          </cards>
        </tray>
        <parking>
          <spot v-for="(card, index) in parkedCards" v-if="index > 2" :class="{empty: card.words.length === 0, selected: card.isSelected}">
            <rotators>
              <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
              <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
            </rotators>
            <card @click="HandleCardClick(event, card)" @pointerup="HandleCardDrop(event, card)" @pointerdown="HandleCardPointerDown(event, card)" :style="{rotate: (card.rotation * 90) + 'deg'}" :class="{rotating: card.isRotating, selected: card.isSelected, dropped: card.justDropped, disabled: isDragging && card === getSelectedCard}">
              <words>
                <word v-for="word in card.words">{{word.value}}</word>
              </words>
            </card>
            <rotators>
              <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
              <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
            </rotators>
          </spot>
        </parking>
      </wrapper>
    </app>
    <script src="helpers/console-enhancer.js" type="text/javascript"></script>
    <script src="models/WordObject-min.js" type="text/javascript"></script>
    <script src="models/CardObject-min.js" type="text/javascript"></script>
    <script src="models/PlayerObject-min.js" type="text/javascript"></script>
    <script src="helpers/vue.min.js" type="text/javascript"></script>
    <script src="scripts/facets.js" type="text/javascript"></script>
  </body>
</html>
