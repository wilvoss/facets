<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Work (portfolio) - Wil Voss</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="user-scalable=yes, width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="keywords" content="" />
    <meta name="description" content="" />
    <link rel="icon" type="image/png" sizes="48x48" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="stylesheet" href="styles/normalize.css" media="screen" />
    <link rel="stylesheet" href="styles/main.css" media="screen" />
  </head>

  <body>
    <app id="app" v-cloak :class="{guessing: isGuessing}">
      <wrapper>
        <controls><button @click="NewGame">New</button></controls>
        <header>
          <hgroup>
            <h1>{{gameName}}</h1>
            <subtitle>{{gameCatchphrase}}</subtitle>
          </hgroup>
        </header>
        <controls><button @click="HandleSubmitButtonPress" :class="{disabled:(!isGuessing && getNumberOfHintsThatHaveBeenFilled !== 4) ||(isGuessing && getNumberOfCardsThatHaveBeenPlacedOnTray !== 4)}">{{ isGuessing ? 'Guess' : 'Ready'}}</button></controls>
      </wrapper>
      <wrapper style="padding: 0">
        <p style="padding: 0; margin: 0; line-height: 100%">{{ isGuessing ? 'Players, you are now guessing the clues given by ' + player.name + '!' : player.name + ', you are giving clues!'}}</p>
      </wrapper>
      <wrapper>
        <rotators>
          <button class="clockwise" @click="RotateTray(1)"></button>
          <button class="anticlockwise" @click="RotateTray(-1)"></button>
        </rotators>
      </wrapper>
      <wrapper>
        <parking>
          <spot @drop="HandleCardTouch(card)" @click="HandleCardTouch(card)" v-for="(card, index) in parkedCards" v-if="index < 3" :class="{empty: card.words.length === 0}">
            <rotators>
              <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
              <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
            </rotators>
            <card :draggable="!isDragging && card.words.length > 0" @dragstart="HandleCardDragStart(card)" @dragover="HandleCardDragOver(event, card)" :style="{rotate: (card.rotation * 90) + 'deg'}" :class="{rotating: card.isRotating, selected: card.isSelected}">
              <words>
                <word v-for="word in card.words">{{word}}</word>
              </words>
            </card>
            <rotators>
              <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
              <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
            </rotators>
          </spot>
        </parking>
        <tray :class="{rotating: trayIsRotating}" :style="{rotate: trayRotation * 90 + 'deg'}">
          <hints>
            <hint v-for="(hint, index) in hints" :key="index">
              <input :disabled="isGuessing" v-model="hint.value" :tabindex="index + 1" type="text" onfocus="this.placeholder=''" onblur="this.placeholder='______'" placeholder="______" />
            </hint>
          </hints>
          <cards>
            <spot @drop="HandleCardTouch(card)" @click="HandleCardTouch(card)" v-for="(card, index) in cards" v-if="!card.isExtra" :class="{empty: card.words.length === 0}">
              <rotators>
                <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
                <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
              </rotators>
              <card :draggable="!isDragging && card.words.length > 0" @dragstart="HandleCardDragStart(card)" @dragover="HandleCardDragOver(event, card)" :style="{rotate: (card.rotation * 90) + 'deg'}" :class="{rotating: card.isRotating, selected: card.isSelected}">
                <words>
                  <word v-for="word in card.words">{{word}}</word>
                </words>
              </card>
              <rotators>
                <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
                <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
              </rotators>
            </spot>
          </cards>
        </tray>
        <parking>
          <spot @drop="HandleCardTouch(card)" @click="HandleCardTouch(card)" v-for="(card, index) in parkedCards" v-if="index > 2" :class="{empty: card.words.length === 0}">
            <rotators>
              <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
              <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
            </rotators>
            <card :draggable="!isDragging && card.words.length > 0" @dragstart="HandleCardDragStart(card)" @dragover="HandleCardDragOver(event, card)" :style="{rotate: (card.rotation * 90) + 'deg'}" :class="{rotating: card.isRotating, selected: card.isSelected}">
              <words>
                <word v-for="word in card.words">{{word}}</word>
              </words>
            </card>
            <rotators>
              <button class="clockwise" @click="RotateCard(event, card, 1)"></button>
              <button class="anticlockwise" @click="RotateCard(event, card, -1)"></button>
            </rotators>
          </spot>
        </parking>
      </wrapper>
    </app>
    <script src="helpers/console-enhancer.js" type="text/javascript"></script>
    <script src="models/WordObject-min.js" type="text/javascript"></script>
    <script src="models/CardObject-min.js" type="text/javascript"></script>
    <script src="models/PlayerObject-min.js" type="text/javascript"></script>
    <script src="helpers/vue.min.js" type="text/javascript"></script>
    <script src="scripts/crumbengine.js" type="text/javascript"></script>
  </body>
</html>
